repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      # Runs the Linter and attempts to automatically fix basic errors and sort imports
      - id: ruff
        args: [ --fix ]
      # Runs the code formatter (extremely fast and compatible with Black rules)
      - id: ruff-format
